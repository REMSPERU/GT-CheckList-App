name: Production AAB (EAS Local)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build-android-aab:
    name: Android AAB (Production, Local)
    runs-on: ubuntu-latest
    timeout-minutes: 75

    concurrency:
      group: prod-aab-local-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}
      cancel-in-progress: true

    env:
      GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"'
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Bump version (patch)
        id: bump_version
        run: |
          TARGET_BRANCH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          VERSION="$VERSION" node -e "const fs=require('fs');const p='app.config.js';const v=process.env.VERSION;const c=fs.readFileSync(p,'utf8');const n=c.replace(/version:\s*'[^']*'/,\`version: '\${v}'\`);if(c===n){throw new Error('No se pudo actualizar version en app.config.js');}fs.writeFileSync(p,n);"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.config.js
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push origin "HEAD:$TARGET_BRANCH"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Expo Prebuild (clean)
        run: |
          echo "Building profile: production"
          APP_ENV=production npx expo prebuild --platform android --clean --non-interactive

      - name: Build AAB
        run: |
          APP_ENV=production eas build --platform android --profile production --local --non-interactive --output ./build-output.aab

      - name: Rename AAB
        id: aab
        run: |
          VERSION="${{ steps.bump_version.outputs.version }}"
          DATE=$(date +%Y%m%d-%H%M)
          FILENAME="GT-CheckList-production-${VERSION}-${DATE}.aab"
          mv build-output.aab "$FILENAME"
          echo "aab_name=$FILENAME" >> $GITHUB_OUTPUT
          echo "AAB: $FILENAME"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.aab.outputs.aab_name }}
          path: ${{ steps.aab.outputs.aab_name }}
          retention-days: 30
