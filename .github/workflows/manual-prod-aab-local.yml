name: Manual Production AAB (EAS Local)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  build-android-aab:
    name: Manual Android AAB (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 75

    concurrency:
      group: manual-prod-aab-${{ github.event.inputs.branch }}
      cancel-in-progress: true

    env:
      GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"'
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Expo Prebuild (clean)
        run: |
          echo "Building profile: production"
          APP_ENV=production npx expo prebuild --platform android --clean --non-interactive

      - name: Build AAB
        run: |
          APP_ENV=production eas build --platform android --profile production --local --non-interactive --output ./build-output.aab

      - name: Rename AAB
        id: aab
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          DATE=$(date +%Y%m%d-%H%M)
          FILENAME="GT-CheckList-production-${VERSION}-${DATE}.aab"
          mv build-output.aab "$FILENAME"
          echo "aab_name=$FILENAME" >> $GITHUB_OUTPUT
          echo "AAB: $FILENAME"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.aab.outputs.aab_name }}
          path: ${{ steps.aab.outputs.aab_name }}
          retention-days: 30
